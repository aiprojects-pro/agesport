apiVersion: apps/v1
kind: Deployment
metadata:
  name: agesport
  namespace: agesport
  labels:
    app: agesport
    app.kubernetes.io/name: agesport
  annotations:
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"agesport:latest","namespace":"agesport"},"fieldPath":"spec.template.spec.containers[?(@.name==\"app\")].image"}]
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agesport
  template:
    metadata:
      labels:
        app: agesport
        app.kubernetes.io/name: agesport
    spec:
      containers:
        - name: app
          image: image-registry.openshift-image-registry.svc:5000/agesport/agesport:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - secretRef:
                name: agesport-config
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              for i in $(seq 1 30); do
                if pg_isready -h "${DB_HOST:-agesport-postgres}" -p "${DB_PORT:-5432}" -U "${DB_USER:-agesport}" -d "${DB_NAME:-agesport_mapa_talento}" >/dev/null 2>&1; then
                  exec npm start
                fi
                echo "[start] waiting for database ($i/30)"
                sleep 5
              done
              echo "[start] database is not ready after retries" >&2
              exit 1
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: agesport-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: agesport
  namespace: agesport
  labels:
    app: agesport
spec:
  type: ClusterIP
  selector:
    app: agesport
  ports:
    - name: http
      port: 80
      targetPort: 3001
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: agesport
  namespace: agesport
  labels:
    app: agesport
  annotations:
    haproxy.router.openshift.io/timeout: "60s"
spec:
  to:
    kind: Service
    name: agesport
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
