apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: agesport
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ingress
  namespace: agesport
spec:
  podSelector:
    matchLabels:
      app: agesport
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - port: 3001
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-to-postgres
  namespace: agesport
spec:
  podSelector:
    matchLabels:
      app: agesport-postgres
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: agesport
        - podSelector:
            matchLabels:
              app: agesport-db-init
      ports:
        - port: 5432
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns-postgres-http
  namespace: agesport
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: agesport-postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 172.30.0.0/16
      ports:
        - port: 5432
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
