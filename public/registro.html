<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGESPORT · Solicitud de acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/portal.css">
</head>
<body>
  <header class="site-topbar">
    <div class="shell inner">
      <a class="site-brand" href="/">
        <span class="site-brand-mark"></span>
        <span class="site-brand-copy">
          <span>AGESPORT</span>
          <strong>Mapa del Talento</strong>
        </span>
      </a>
      <div class="topbar-actions">
        <a class="btn btn-secondary" href="/acceso.html">Ya tengo acceso</a>
        <a class="btn btn-primary" href="/">Volver</a>
      </div>
    </div>
  </header>

  <main class="page shell">
    <section class="hero-block">
      <div class="eyebrow">Solicitud de alta</div>
      <h1>Incorporación al Mapa del Talento</h1>
      <p>Registro inicial para profesionales vinculados a AGESPORT. Tras la revisión administrativa, la cuenta quedará habilitada para el entorno privado.</p>
    </section>

    <section class="form-card" style="margin-top:18px">
      <h2>Datos de solicitud</h2>
      <form id="registerForm" class="form-grid" style="margin-top:18px">
        <div class="field">
          <label for="nombre">Nombre</label>
          <input id="nombre" required>
        </div>
        <div class="field">
          <label for="apellidos">Apellidos</label>
          <input id="apellidos" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" required>
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" required placeholder="Mínimo 8 caracteres, con mayúscula y número">
        </div>
        <div class="field">
          <label for="entidad">Entidad</label>
          <input id="entidad">
        </div>
        <div class="field">
          <label for="cargo_actual">Cargo actual</label>
          <input id="cargo_actual" required>
        </div>
        <div class="field">
          <label for="provincia">Provincia</label>
          <select id="provincia" required>
            <option value="">Selecciona provincia</option>
            <option>Almería</option><option>Cádiz</option><option>Córdoba</option><option>Granada</option>
            <option>Huelva</option><option>Jaén</option><option>Málaga</option><option>Sevilla</option>
          </select>
        </div>
        <div class="field">
          <label for="localidad">Localidad</label>
          <input id="localidad" required>
        </div>
        <div class="field">
          <label for="anos_experiencia">Años de experiencia</label>
          <input id="anos_experiencia" type="number" min="0" max="50" required>
        </div>
        <div class="field">
          <label for="rol_cluster">Relación con el clúster</label>
          <select id="rol_cluster">
            <option value="">Sin especificar</option>
            <option value="gestion">Gestión</option>
            <option value="servicios">Servicios</option>
            <option value="infra">Infraestructura</option>
            <option value="tech">Tecnología</option>
          </select>
        </div>
        <div class="field-full">
          <label for="especialidades">Especialidades</label>
          <select id="especialidades" multiple size="6">
            <option>Gestión de Instalaciones</option>
            <option>Organización de Eventos</option>
            <option>Derecho Deportivo</option>
            <option>Contratación y Patrimonio</option>
            <option>Marketing y Patrocinio</option>
            <option>Digitalización e IA</option>
            <option>Recursos Humanos</option>
            <option>Accesibilidad e Inclusión</option>
            <option>Actividad Física y Salud</option>
            <option>Seguridad y Autoprotección</option>
          </select>
        </div>
        <div class="field-full checkbox-row">
          <input id="acepta_mapa_interactivo" type="checkbox" checked>
          <label for="acepta_mapa_interactivo">Autorizo la participación de mi perfil en el entorno privado y en las dinámicas internas de relación profesional.</label>
        </div>
        <div class="field-full checkbox-row">
          <input id="acepta_visibilidad_datos" type="checkbox" checked>
          <label for="acepta_visibilidad_datos">Acepto la visibilidad de mis datos profesionales dentro del espacio privado de la plataforma.</label>
        </div>
        <div class="field-full checkbox-row">
          <input id="acepta_mensajeria" type="checkbox" checked>
          <label for="acepta_mensajeria">Acepto el uso de mensajería interna por parte de otros socios autenticados.</label>
        </div>
        <div class="field-full">
          <button class="btn btn-primary" type="submit" id="registerBtn">Enviar solicitud</button>
        </div>
      </form>
      <div id="registerMessage" class="message-box"></div>
    </section>
  </main>

  <script src="/assets/portal.js"></script>
  <script src="/assets/register.js"></script>
</body>
</html>
