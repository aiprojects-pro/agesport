<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Evita que el token en ?token=... viaje en el Referer hacia fonts.gstatic.com u otros.
       NOTA: el token sigue apareciendo en (a) el history del navegador y
       (b) los access logs de cualquier proxy/CDN delante de nuestro
       servidor. Mitigación: el token caduca a 1h y se invalida tras un
       uso (used_at en password_reset_tokens). Si se quisiera eliminar
       esa exposición habría que migrar a fragment (#token=...), pero
       eso requiere reescribir el flujo de envío de email y romper la
       compatibilidad con clientes que reescriben fragments. -->
  <meta name="referrer" content="no-referrer">
  <title>AGESPORT · Restablecer contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/portal.css">
</head>
<body>
  <header class="site-topbar">
    <div class="shell inner">
      <a class="site-brand" href="/">
        <span class="site-brand-mark" aria-label="AGESPORT"></span>
      </a>
      <div class="topbar-actions">
        <a class="btn btn-primary" href="/">Volver</a>
      </div>
    </div>
  </header>

  <main class="page shell">
    <section class="hero-grid">
      <article class="hero-block">
        <div class="eyebrow">Recuperar acceso</div>
        <h1>Nueva contraseña</h1>
        <p>Introduce la nueva contraseña que quieras usar. Debe tener al menos 8 caracteres.</p>
      </article>
    </section>

    <section style="margin-top:18px;max-width:560px">
      <article class="form-card">
        <h2>Restablecer contraseña</h2>
        <form id="resetForm" class="form-grid" style="margin-top:16px">
          <div class="field-full">
            <label for="newPassword">Nueva contraseña</label>
            <input id="newPassword" type="password" required minlength="8" autocomplete="new-password">
          </div>
          <div class="field-full">
            <label for="newPasswordConfirm">Repite la contraseña</label>
            <input id="newPasswordConfirm" type="password" required minlength="8" autocomplete="new-password">
          </div>
          <div class="field-full">
            <button class="btn btn-primary" type="submit" id="resetBtn">Restablecer contraseña</button>
          </div>
        </form>
        <div id="resetMessage" class="message-box"></div>
      </article>
    </section>
  </main>

  <script src="/assets/portal.js"></script>
  <script>
    (function () {
      const { request, setMessage } = window.AgesportPortal;
      const form = document.getElementById('resetForm');
      const msg = document.getElementById('resetMessage');
      const btn = document.getElementById('resetBtn');

      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const isAdmin = params.get('type') === 'admin';
      const endpoint = isAdmin
        ? '/api/auth/admin/reset-password'
        : '/api/auth/reset-password';

      if (!token) {
        setMessage(msg, false, 'Falta el token en el enlace. Vuelve a solicitar el restablecimiento.');
        form.style.display = 'none';
        return;
      }

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        const p1 = document.getElementById('newPassword').value;
        const p2 = document.getElementById('newPasswordConfirm').value;
        if (p1 !== p2) {
          setMessage(msg, false, 'Las dos contraseñas no coinciden.');
          return;
        }
        btn.disabled = true;
        btn.textContent = 'Restableciendo…';
        try {
          const data = await request(endpoint, {
            method: 'POST',
            body: JSON.stringify({ token, newPassword: p1 })
          });
          setMessage(msg, true, data.message + ' Redirigiendo al acceso…');
          setTimeout(function () { window.location.href = '/acceso.html'; }, 1500);
        } catch (error) {
          setMessage(msg, false, error.message);
        } finally {
          btn.disabled = false;
          btn.textContent = 'Restablecer contraseña';
        }
      });
    })();
  </script>
</body>
</html>
