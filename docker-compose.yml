# ===================================================================
# DOCKER COMPOSE - MAPA DEL TALENTO AGESPORT
# ===================================================================
# Stack completo: aplicación + base de datos + cache + proxy

version: '3.8'

services:
  # ===============================================
  # BASE DE DATOS POSTGRESQL + POSTGIS
  # ===============================================
  database:
    image: postgis/postgis:15-3.3-alpine
    container_name: agesport-db
    environment:
      POSTGRES_DB: ${DB_NAME:-agesport_mapa_talento}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=es_ES.UTF-8 --lc-ctype=es_ES.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backups:/backups
    ports:
      - "5432:5432"
    networks:
      - agesport-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-agesport_mapa_talento}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===============================================
  # APLICACIÓN PRINCIPAL
  # ===============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agesport-app
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-agesport_mapa_talento}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PORT: 3001
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOADS_PATH: /app/uploads
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
      - backup_data:/app/backups
    ports:
      - "3001:3001"
    networks:
      - agesport-network
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===============================================
  # CACHE REDIS (opcional)
  # ===============================================
  cache:
    image: redis:7-alpine
    container_name: agesport-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-agesport123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - agesport-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ===============================================
  # PROXY NGINX (opcional para SSL)
  # ===============================================
  nginx:
    image: nginx:alpine
    container_name: agesport-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./public:/var/www/html:ro
    networks:
      - agesport-network
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - with-nginx

# ===============================================
# VOLÚMENES PERSISTENTES
# ===============================================
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
  backup_data:
    driver: local
  redis_data:
    driver: local

# ===============================================
# RED INTERNA
# ===============================================
networks:
  agesport-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
